<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Nexora Agency</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080c14; --card: #111827; --border: #1e2d45;
      --accent: #4f8ef7; --accent2: #7c5cfc; --text: #f1f5f9; --muted: #8896a8; --radius: 14px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 6%; text-align: center; }
    .card { max-width: 520px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 48px 36px; }
    .icon { width: 56px; height: 56px; margin: 0 auto 20px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 28px; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 14px; letter-spacing: -0.5px; }
    p { color: var(--muted); margin-bottom: 28px; }
    a.btn { display: inline-block; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; padding: 13px 28px; border-radius: 10px; text-decoration: none; font-weight: 600; }
    a.btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#10003;</div>
    <h1>Message Received</h1>
    <p>Thanks for reaching out to Nexora Agency. We'll get back to you within 24 hours with next steps.</p>
    <a class="btn" href="/">Back to Home</a>
  </div>
</body>
</html>
